name: Build & Deploy

#The Trigger
on:
  push:
    branches:
      - master
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    #The runner
    runs-on: ubuntu-latest
    
    steps:
    #Pre-built actions
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      #Advanced docker layer caching

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/kube-snake-game:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

# THE UPGRADED PRODUCTION STEP: No SSH, No Sudo!
    # Update the container image using the secure token
    - name: Deploy New Image via Kubernetes API
      uses: steebchen/kubectl@v3
      with:
        config: '' # Forces native variable authentication
        command: set image deployment/snake-game-deployment snake-game=${{ secrets.DOCKERHUB_USERNAME }}/snake-game:${{ github.sha }} --namespace=default
      env:
        KUBE_URL: ${{ secrets.EC2_PUBLIC_IP }}
        KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        KUBE_INSECURE_SKIP_TLS_VERIFY: true

    # Watch the rolling update to ensure it succeeds
    - name: Verify Deployment Rollout Status
      uses: steebchen/kubectl@v3
      with:
        config: ''
        command: rollout status deployment/snake-game-deployment --namespace=default
      env:
        KUBE_URL: ${{ secrets.EC2_PUBLIC_IP }}
        KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        KUBE_INSECURE_SKIP_TLS_VERIFY: true
          
        